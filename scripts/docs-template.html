<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IcoMo — Icon Browser</title>
  <script>/* @@ICONS_DATA@@ */</script>
  <style>
    /* ── Design tokens (ds-mo subset) ───────────────────────────────────── */
    :root {
      --color-background-primary:   #ffffff;
      --color-background-secondary: oklch(97% 0 0);
      --color-foreground-primary:   #000000;
      --color-foreground-secondary: rgb(0 0 0 / 0.5);
      --color-border-primary:       rgb(0 0 0 / 0.1);
      --color-accent:               oklch(50% 0.17 250);
      --color-copy-flash:           oklch(93% 0.06 145);
      color-scheme: light;
    }
    :root[data-theme="dark"] {
      --color-background-primary:   oklch(20% 0 0);
      --color-background-secondary: oklch(16% 0 0);
      --color-foreground-primary:   #ffffff;
      --color-foreground-secondary: rgb(255 255 255 / 0.5);
      --color-border-primary:       rgb(255 255 255 / 0.1);
      --color-accent:               oklch(65% 0.2 250);
      --color-copy-flash:           oklch(27% 0.05 145);
      color-scheme: dark;
    }

    /* ── Reset / base ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--color-background-primary);
      color: var(--color-foreground-primary);
      min-height: 100dvh;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--color-background-primary);
      border-bottom: 1px solid var(--color-border-primary);
      backdrop-filter: blur(8px);
    }

    .logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo-badge {
      font-size: 11px;
      font-weight: 500;
      color: var(--color-foreground-secondary);
      background: var(--color-background-secondary);
      border: 1px solid var(--color-border-primary);
      border-radius: 100px;
      padding: 1px 7px;
    }

    .search-wrap {
      flex: 1;
      min-width: 0;
      max-width: 340px;
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-foreground-secondary);
      pointer-events: none;
      display: flex;
    }
    .search {
      width: 100%;
      padding: 7px 12px 7px 32px;
      border: 1px solid var(--color-border-primary);
      border-radius: 8px;
      background: var(--color-background-secondary);
      color: var(--color-foreground-primary);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search::placeholder { color: var(--color-foreground-secondary); }
    .search:focus { border-color: var(--color-accent); }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .size-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .size-label {
      font-size: 12px;
      color: var(--color-foreground-secondary);
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: right;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 72px;
      height: 4px;
      background: var(--color-border-primary);
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: var(--color-foreground-primary);
      border-radius: 50%;
      transition: transform 0.1s;
    }
    input[type="range"]:active::-webkit-slider-thumb { transform: scale(1.2); }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--color-foreground-primary);
      border: none;
      border-radius: 50%;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--color-border-primary);
      border-radius: 8px;
      background: transparent;
      color: var(--color-foreground-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .icon-btn:hover { background: var(--color-background-secondary); }

    /* ── Meta bar ────────────────────────────────────────────────────────── */
    .meta-bar {
      padding: 10px 16px 0;
      font-size: 12px;
      color: var(--color-foreground-secondary);
    }

    /* ── Grid ────────────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 2px;
      padding: 10px 12px 40px;
    }

    /* ── Icon card ───────────────────────────────────────────────────────── */
    .icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      position: relative;
      transition: background 0.1s;
      -webkit-user-select: none;
      user-select: none;
      outline: none;
    }
    .icon-card:hover,
    .icon-card:focus-visible {
      background: var(--color-background-secondary);
    }
    .icon-card:focus-visible {
      box-shadow: 0 0 0 2px var(--color-accent);
    }
    .icon-card.copied {
      background: var(--color-copy-flash);
    }
    .icon-card svg {
      width: var(--icon-size, 20px);
      height: var(--icon-size, 20px);
      color: var(--color-foreground-primary);
      flex-shrink: 0;
      transition: width 0.12s, height 0.12s;
    }
    .icon-name {
      font-size: 10px;
      line-height: 1.35;
      color: var(--color-foreground-secondary);
      text-align: center;
      word-break: break-all;
      max-width: 80px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Tooltip */
    .icon-card::after {
      content: 'Click to copy import';
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-foreground-primary);
      color: var(--color-background-primary);
      font-size: 10px;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 10;
    }
    .icon-card:hover::after { opacity: 1; }
    .icon-card.copied::after { content: 'Copied!'; opacity: 1; }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      padding: 64px 0;
      text-align: center;
      color: var(--color-foreground-secondary);
    }
    .empty-state p { font-size: 14px; }
    .empty-state small { font-size: 12px; opacity: 0.7; }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--color-foreground-primary);
      color: var(--color-background-primary);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
      white-space: nowrap;
      max-width: calc(100vw - 40px);
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Loading ─────────────────────────────────────────────────────────── */
    .loading {
      grid-column: 1 / -1;
      padding: 64px 0;
      text-align: center;
      color: var(--color-foreground-secondary);
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- @@SPRITE@@ -->

<!-- Toolbar -->
<nav class="toolbar" role="banner">
  <span class="logo">
    IcoMo
    <span class="logo-badge">@ds-mo/icons</span>
  </span>

  <div class="search-wrap">
    <span class="search-icon" aria-hidden="true">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M10.4697 11.5303C10.7626 11.8232 11.2374 11.8232 11.5303 11.5303C11.8232 11.2374 11.8232 10.7626 11.5303 10.4697L9.7275 8.6669C10.2212 7.9342 10.5 7.0503 10.5 6.1C10.5 3.6699 8.5301 1.7 6.1 1.7C3.6699 1.7 1.7 3.6699 1.7 6.1C1.7 8.5301 3.6699 10.5 6.1 10.5C7.0503 10.5 7.9342 10.2212 8.6669 9.7275L10.4697 11.5303ZM3.2 6.1C3.2 4.4983 4.4983 3.2 6.1 3.2C7.7017 3.2 9 4.4983 9 6.1C9 7.7017 7.7017 9 6.1 9C4.4983 9 3.2 7.7017 3.2 6.1Z"/>
      </svg>
    </span>
    <input
      class="search"
      type="search"
      id="search"
      placeholder="Search icons…"
      autocomplete="off"
      spellcheck="false"
      aria-label="Search icons"
    >
  </div>

  <div class="controls">
    <div class="size-control" role="group" aria-label="Icon size">
      <span class="size-label" id="size-label" aria-live="polite">20px</span>
      <input
        type="range"
        id="size-range"
        min="12"
        max="48"
        value="20"
        step="2"
        aria-label="Icon size"
      >
    </div>
    <button class="icon-btn" id="theme-btn" aria-label="Toggle theme" title="Toggle theme">
      <svg id="theme-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <!-- moon -->
        <path d="M8 1C4.134 1 1 4.134 1 8s3.134 7 7 7 7-3.134 7-7S11.866 1 8 1zm0 12.5A5.5 5.5 0 1 1 8 2.5a5.5 5.5 0 0 1 0 11z" opacity="0"/>
        <path id="theme-path" d="M13.502 10.502A6 6 0 0 1 5.498 2.498 6.5 6.5 0 1 0 13.502 10.502z"/>
      </svg>
    </button>
  </div>
</nav>

<div class="meta-bar" id="meta-bar" aria-live="polite"></div>

<main>
  <div class="grid" id="grid" role="list">
    <div class="loading">Loading icons…</div>
  </div>
</main>

<div class="toast" id="toast" role="status" aria-live="assertive"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────

let spriteReady = false;
let query = '';
let iconSize = 20;
let theme = localStorage.getItem('icomo-theme') || 'light';

// ── Refs ─────────────────────────────────────────────────────────────────────

const grid     = document.getElementById('grid');
const metaBar  = document.getElementById('meta-bar');
const searchEl = document.getElementById('search');
const sizeRange = document.getElementById('size-range');
const sizeLabel = document.getElementById('size-label');
const themeBtn = document.getElementById('theme-btn');
const themePath = document.getElementById('theme-path');
const toast    = document.getElementById('toast');

// ── Theme ─────────────────────────────────────────────────────────────────────

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  // Moon (dark mode) vs Sun (light mode)
  if (t === 'dark') {
    // Sun icon
    themePath.setAttribute('d', 'M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z');
    themeBtn.setAttribute('aria-label', 'Switch to light mode');
  } else {
    // Moon icon
    themePath.setAttribute('d', 'M13.502 10.502A6 6 0 0 1 5.498 2.498 6.5 6.5 0 1 0 13.502 10.502z');
    themeBtn.setAttribute('aria-label', 'Switch to dark mode');
  }
}

applyTheme(theme);

themeBtn.addEventListener('click', () => {
  theme = theme === 'light' ? 'dark' : 'light';
  applyTheme(theme);
  localStorage.setItem('icomo-theme', theme);
});

// ── Size slider ───────────────────────────────────────────────────────────────

function applySize(size) {
  iconSize = size;
  sizeLabel.textContent = size + 'px';
  document.documentElement.style.setProperty('--icon-size', size + 'px');
}

sizeRange.addEventListener('input', e => applySize(Number(e.target.value)));

// ── Search ────────────────────────────────────────────────────────────────────

searchEl.addEventListener('input', e => {
  query = e.target.value.trim().toLowerCase();
  if (spriteReady) render();
});

// ── Sprite injection ──────────────────────────────────────────────────────────
// Sprite is inlined by build-docs.mjs — see @@SPRITE@@ in <body>
spriteReady = true;
render();

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const filtered = query
    ? ICONS.filter(i => i.pascal.toLowerCase().includes(query))
    : ICONS;

  metaBar.textContent = query
    ? `${filtered.length} of ${ICONS.length} icons`
    : `${ICONS.length} icons`;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" role="status">
        <p>No icons match &ldquo;${escHtml(query)}&rdquo;</p>
        <small>Try a different search term</small>
      </div>`;
    return;
  }

  // Build fragment to minimise reflows
  const frag = document.createDocumentFragment();

  for (const icon of filtered) {
    const card = document.createElement('div');
    card.className = 'icon-card';
    card.setAttribute('role', 'listitem');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', `${icon.pascal} — click to copy import`);

    card.innerHTML = `
      <svg aria-hidden="true" focusable="false" fill="currentColor">
        <use href="#${icon.kebab}"></use>
      </svg>
      <span class="icon-name">${escHtml(icon.pascal)}</span>`;

    card.addEventListener('click', () => copyImport(icon.pascal, card));
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        copyImport(icon.pascal, card);
      }
    });

    frag.appendChild(card);
  }

  grid.innerHTML = '';
  grid.appendChild(frag);
}

// ── Copy import ───────────────────────────────────────────────────────────────

let toastTimer = null;
let copyTimer = null;

function copyImport(pascal, card) {
  const text = `import { ${pascal} } from '@ds-mo/icons'`;

  const done = () => {
    card.classList.add('copied');
    clearTimeout(copyTimer);
    copyTimer = setTimeout(() => card.classList.remove('copied'), 700);
    showToast(text);
  };

  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, cb) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
  document.body.appendChild(el);
  el.select();
  try { document.execCommand('copy'); } catch (_) {}
  document.body.removeChild(el);
  cb();
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

// ── Util ──────────────────────────────────────────────────────────────────────

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
