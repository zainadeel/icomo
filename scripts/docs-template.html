<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IcoMo — Icon Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script>/* @@ICONS_DATA@@ */</script>
  <style>
    /* ── Design tokens ───────────────────────────────────────────────────── */
    :root {
      --bg:       #ffffff;
      --fg:       #000000;
      --fg-muted: rgb(0 0 0 / 0.5);
      --divider:  rgb(0 0 0 / 0.1);
      color-scheme: light;
    }
    [data-theme="dark"] {
      --bg:       #000000;
      --fg:       #ffffff;
      --fg-muted: rgb(255 255 255 / 0.5);
      --divider:  rgb(255 255 255 / 0.1);
      color-scheme: dark;
    }

    /* ── Reset / base ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    ::selection {
      background: var(--divider);
      color: inherit;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 16px;
      min-height: 100dvh;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: auto auto 1fr;
      align-items: center;
      gap: 16px;
      height: 48px;
      padding: 0 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--divider);
    }

    .logo {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    /* ── Search ──────────────────────────────────────────────────────────── */
    .search-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .search {
      width: 0; /* set by JS */
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--fg);
      font-size: 12px;
      line-height: 16px;
      font-family: inherit;
      text-align: left;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .search::placeholder { color: var(--fg-muted); }
    .search::-webkit-search-cancel-button { -webkit-appearance: none; }
    .search-count {
      font-size: 12px;
      line-height: 16px;
      color: var(--fg-muted);
      white-space: nowrap;
      display: none;
    }
    .search-count.visible { display: block; }

    /* ── Controls ────────────────────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: flex-end;
    }

    /* ── Text toggles (size + theme) ─────────────────────────────────────── */
    .text-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toggle-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      color: var(--fg-muted);
      line-height: 1;
    }
    .toggle-btn.active { color: var(--fg); }
    .group-divider {
      width: 1px;
      height: 12px;
      background: var(--divider);
      flex-shrink: 0;
    }

    /* ── Sub-toolbar (category tabs) ─────────────────────────────────────── */
    .sub-toolbar {
      position: sticky;
      top: 48px;
      z-index: 19;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 40px;
      padding: 0 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--divider);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .sub-toolbar::-webkit-scrollbar { display: none; }
    .sub-toolbar.searching { display: none; }

    .tab {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      color: var(--fg-muted);
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tab.active { color: var(--fg); }

    /* ── Grid ────────────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 2px;
      padding: 10px 12px 40px;
    }

    /* ── Icon card ───────────────────────────────────────────────────────── */
    .icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-radius: 0;
      cursor: pointer;
      position: relative;
      -webkit-user-select: none;
      user-select: none;
      outline: none;
    }
    .icon-card:hover,
    .icon-card:focus-visible {
      background: var(--divider);
    }
    .icon-card:focus-visible {
      box-shadow: 0 0 0 2px var(--fg);
    }
    .icon-card.copied {
      background: var(--divider);
    }
    .icon-card svg {
      width: var(--icon-size, 24px);
      height: var(--icon-size, 24px);
      color: var(--fg);
      flex-shrink: 0;
    }
    .icon-name {
      font-size: 9px;
      line-height: 1.35;
      color: var(--fg-muted);
      text-align: center;
      word-break: break-all;
      max-width: 80px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Tooltip */
    .icon-card::after {
      content: 'Click to copy import';
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--fg);
      color: var(--bg);
      font-size: 10px;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 30;
    }
    .icon-card:hover::after { opacity: 1; }
    .icon-card.copied::after { content: 'Copied!'; opacity: 1; }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      padding: 64px 0;
      text-align: center;
      color: var(--fg-muted);
    }
    .empty-state p { font-size: 12px; }
    .empty-state small { font-size: 12px; opacity: 0.7; }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--fg);
      color: var(--bg);
      padding: 8px 14px;
      border-radius: 0;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', monospace;
      white-space: nowrap;
      max-width: calc(100vw - 40px);
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Loading ─────────────────────────────────────────────────────────── */
    .loading {
      grid-column: 1 / -1;
      padding: 64px 0;
      text-align: center;
      color: var(--fg-muted);
      font-size: 12px;
    }
  </style>
</head>
<body>

<!-- @@SPRITE@@ -->

<!-- Toolbar -->
<nav class="toolbar" role="banner">
  <span class="logo">@ds-mo/icons</span>

  <div class="search-wrap">
    <input
      class="search"
      type="search"
      id="search"
      placeholder=""
      autocomplete="off"
      spellcheck="false"
      aria-label="Search icons"
    >
    <span class="search-count" id="search-count" aria-live="polite"></span>
  </div>

  <div class="controls">
    <div class="text-toggle" role="group" aria-label="Icon size">
      <button class="toggle-btn" data-size="16">16</button>
      <button class="toggle-btn active" data-size="24">24</button>
      <button class="toggle-btn" data-size="48">48</button>
    </div>
    <div class="group-divider" aria-hidden="true"></div>
    <div class="text-toggle" role="group" aria-label="Color theme">
      <button class="toggle-btn" id="theme-light-btn">Light</button>
      <button class="toggle-btn" id="theme-dark-btn">Dark</button>
    </div>
  </div>
</nav>

<!-- Sub-toolbar (category filter) -->
<nav class="sub-toolbar" id="sub-toolbar" role="group" aria-label="Icon category"></nav>

<main>
  <div class="grid" id="grid" role="list">
    <div class="loading">Loading icons…</div>
  </div>
</main>

<div class="toast" id="toast" role="status" aria-live="assertive"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────

let spriteReady = false;
let query = '';
let activeCategory = localStorage.getItem('icomo-category') || 'all';
let iconSize = Number(localStorage.getItem('icomo-size')) || 24;
let theme = localStorage.getItem('icomo-theme') || 'light';

// Config for the category tabs. The 'all' tab is always first; the rest
// come from the CATEGORIES manifest in the same order as the build.
const TAB_CONFIG = [
  { id: 'all',    label: 'All' },
  { id: 'system', label: 'System' },
  { id: 'flag',   label: 'Flags' },
];

// ── Refs ─────────────────────────────────────────────────────────────────────

const grid          = document.getElementById('grid');
const subToolbar    = document.getElementById('sub-toolbar');
const searchEl      = document.getElementById('search');
const searchCount   = document.getElementById('search-count');
const toast         = document.getElementById('toast');
const themeLightBtn = document.getElementById('theme-light-btn');
const themeDarkBtn  = document.getElementById('theme-dark-btn');

searchEl.placeholder = `Search ${ICONS.length} icons`;

// ── Search width sizer ────────────────────────────────────────────────────────

const searchSizer = document.createElement('span');
searchSizer.setAttribute('aria-hidden', 'true');
searchSizer.style.cssText = 'position:fixed;top:-9999px;visibility:hidden;white-space:pre;font-size:12px;font-family:Inter,system-ui,sans-serif;pointer-events:none;';
document.body.appendChild(searchSizer);

function syncSearchWidth() {
  searchSizer.textContent = searchEl.value || searchEl.placeholder;
  searchEl.style.width = Math.ceil(searchSizer.offsetWidth) + 4 + 'px';
}

syncSearchWidth();

// ── Theme ─────────────────────────────────────────────────────────────────────

function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  themeLightBtn.classList.toggle('active', t === 'light');
  themeDarkBtn.classList.toggle('active', t === 'dark');
}

applyTheme(theme);

themeLightBtn.addEventListener('click', () => {
  applyTheme('light');
  localStorage.setItem('icomo-theme', 'light');
});
themeDarkBtn.addEventListener('click', () => {
  applyTheme('dark');
  localStorage.setItem('icomo-theme', 'dark');
});

// ── Size toggle ───────────────────────────────────────────────────────────────

function applySize(size) {
  iconSize = size;
  document.documentElement.style.setProperty('--icon-size', size + 'px');
  document.querySelectorAll('.text-toggle[aria-label="Icon size"] .toggle-btn').forEach(btn => {
    btn.classList.toggle('active', Number(btn.dataset.size) === size);
  });
}

document.querySelectorAll('.text-toggle[aria-label="Icon size"] .toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    applySize(Number(btn.dataset.size));
    localStorage.setItem('icomo-size', btn.dataset.size);
  });
});

applySize(iconSize);

// ── Search ────────────────────────────────────────────────────────────────────

searchEl.addEventListener('input', e => {
  query = e.target.value.trim().toLowerCase();
  syncSearchWidth();
  // When searching, hide category tabs and search across everything
  subToolbar.classList.toggle('searching', Boolean(query));
  if (spriteReady) render();
});

// ── Category tabs ────────────────────────────────────────────────────────────

function renderTabs() {
  // Only show tabs for categories that actually have icons
  const tabs = TAB_CONFIG.filter(t => {
    if (t.id === 'all') return true;
    return CATEGORIES[t.id] && CATEGORIES[t.id].count > 0;
  });

  subToolbar.innerHTML = tabs.map(t => {
    const isActive = t.id === activeCategory;
    return `<button
      class="tab${isActive ? ' active' : ''}"
      data-category="${t.id}"
      role="tab"
      aria-selected="${isActive}"
    >${t.label}</button>`;
  }).join('');

  subToolbar.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.category;
      localStorage.setItem('icomo-category', activeCategory);
      renderTabs();
      if (spriteReady) render();
    });
  });
}

renderTabs();

// ── Sprite injection ──────────────────────────────────────────────────────────
// Sprite is inlined by build-docs.mjs — see @@SPRITE@@ in <body>
spriteReady = true;
render();

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  // Search is global across categories; when no query, narrow by active tab.
  let filtered;
  if (query) {
    filtered = ICONS.filter(i =>
      i.pascal.toLowerCase().includes(query) ||
      (i.aliases && i.aliases.some(a => a.includes(query)))
    );
  } else if (activeCategory === 'all') {
    filtered = ICONS;
  } else {
    filtered = ICONS.filter(i => i.category === activeCategory);
  }

  if (query) {
    searchCount.textContent = `${filtered.length}/${ICONS.length}`;
    searchCount.classList.add('visible');
  } else {
    searchCount.classList.remove('visible');
  }

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" role="status">
        <p>No icons match &ldquo;${escHtml(query)}&rdquo;</p>
        <small>Try a different search term</small>
      </div>`;
    return;
  }

  // Build fragment to minimise reflows
  const frag = document.createDocumentFragment();

  for (const icon of filtered) {
    const card = document.createElement('div');
    card.className = 'icon-card';
    card.setAttribute('role', 'listitem');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', `${icon.pascal} — click to copy import`);

    card.innerHTML = `
      <svg aria-hidden="true" focusable="false" fill="currentColor">
        <use href="#${icon.kebab}"></use>
      </svg>
      <span class="icon-name">${escHtml(icon.pascal)}</span>`;

    card.addEventListener('click', () => copyImport(icon.pascal, card));
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        copyImport(icon.pascal, card);
      }
    });

    frag.appendChild(card);
  }

  grid.innerHTML = '';
  grid.appendChild(frag);
}

// ── Copy import ───────────────────────────────────────────────────────────────

let toastTimer = null;
let copyTimer = null;

function copyImport(pascal, card) {
  const text = `import { ${pascal} } from '@ds-mo/icons'`;

  const done = () => {
    card.classList.add('copied');
    clearTimeout(copyTimer);
    copyTimer = setTimeout(() => card.classList.remove('copied'), 700);
    showToast(text);
  };

  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, cb) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
  document.body.appendChild(el);
  el.select();
  try { document.execCommand('copy'); } catch (_) {}
  document.body.removeChild(el);
  cb();
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
}

// ── Util ──────────────────────────────────────────────────────────────────────

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
